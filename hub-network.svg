  <text x="790" y="374" text-anchor="middle" font-size="10" fill="#4a5568">イコールZINEコミュニティ</text>
  <text x="790" y="391" text-anchor="middle" font-size="10" fill="#4a5568">TAKiBiBAシェア書店 5拠点</text>
  <text x="790" y="408" text-anchor="middle" font-size="10" fill="#4a5568">桐原書店『森のコミュニティ』</text>
  <text x="790" y="425" text-anchor="middle" font-size="10" fill="#4a5568">執筆者ネットワーク 30名+</text>

