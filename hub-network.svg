  <text x="345" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">田原真人</text>

  <rect x="405" y="230" width="90" height="34" rx="17" fill="#1a365d"/>
  <text x="450" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">北田朋也</text>

  <rect x="510" y="230" width="90" height="34" rx="17" fill="#1a365d"/>
  <text x="555" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">野辺みなも</text>

