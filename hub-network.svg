  <text x="345" y="302" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">竹本記子</text>

  <rect x="405" y="280" width="90" height="34" rx="17" fill="#2b6cb0"/>
  <text x="450" y="302" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">伊原敦子</text>

  <rect x="510" y="280" width="90" height="34" rx="17" fill="#2b6cb0"/>
