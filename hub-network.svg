<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#fafafa" rx="8"/>

  <!-- Connection lines (drawn first, behind everything) -->
