  <text x="740" y="520" text-anchor="middle" font-size="10" fill="#4a5568">TAKiBiBA（かすみがうら）</text>
  <text x="740" y="537" text-anchor="middle" font-size="10" fill="#4a5568">隠岐の島ジオパーク</text>
  <text x="740" y="554" text-anchor="middle" font-size="10" fill="#4a5568">京都・出町桝形商店街</text>
  <text x="740" y="571" text-anchor="middle" font-size="10" fill="#4a5568">長崎県離島ネットワーク</text>
  <text x="740" y="588" text-anchor="middle" font-size="10" fill="#4a5568">KUBERU（フォルケホイスコーレ型）</text>

  <!-- ===== Bottom-center: Technology ===== -->
  <rect x="330" y="485" width="240" height="100" rx="10" fill="#e3f2fd" stroke="#2b6cb0" stroke-width="1.5"/>
  <text x="450" y="510" text-anchor="middle" font-size="13" font-weight="700" fill="#2b6cb0">テクノロジー</text>
  <text x="450" y="532" text-anchor="middle" font-size="10" fill="#4a5568">MUSVIの窓（遠隔協働）</text>
  <text x="450" y="549" text-anchor="middle" font-size="10" fill="#4a5568">Claude Code ＋ Obsidian</text>
  <text x="450" y="566" text-anchor="middle" font-size="10" fill="#4a5568">MCP（業務ソフト連携）</text>
  <text x="450" y="583" text-anchor="middle" font-size="10" fill="#4a5568">GitHub（知の資産化）</text>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1a365d">プラネタリー・ラーニング ネットワーク構造</text>
  <text x="450" y="64" text-anchor="middle" font-size="12" fill="#4a5568">少数のコアチーム × 多様な提携メンバー × 背後のネットワーク</text>

</svg>
