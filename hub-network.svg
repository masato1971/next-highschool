  <rect x="438" y="352" width="80" height="26" rx="13" fill="#e3f2fd" stroke="#2b6cb0" stroke-width="1"/>
  <text x="478" y="370" text-anchor="middle" font-size="9" fill="#2b6cb0">スクラッチ</text>

  <rect x="526" y="352" width="90" height="26" rx="13" fill="#e3f2fd" stroke="#2b6cb0" stroke-width="1"/>
