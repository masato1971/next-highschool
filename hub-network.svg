  <line x1="290" y1="250" x2="120" y2="170" stroke="#7e57c2" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Education -->
  <line x1="290" y1="320" x2="100" y2="370" stroke="#2e7d32" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="290" y1="350" x2="100" y2="410" stroke="#2e7d32" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="290" y1="370" x2="100" y2="450" stroke="#2e7d32" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Enterprise -->
  <line x1="610" y1="220" x2="780" y2="130" stroke="#e65100" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="610" y1="250" x2="780" y2="170" stroke="#e65100" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
