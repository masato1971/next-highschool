  <text x="790" y="162" text-anchor="middle" font-size="10" fill="#4a5568">ユニオンフォレスト・マスコール</text>
  <text x="790" y="179" text-anchor="middle" font-size="10" fill="#4a5568">今井運送（200台）</text>

