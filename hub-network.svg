  <line x1="610" y1="370" x2="780" y2="420" stroke="#c62828" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- International -->
  <line x1="370" y1="410" x2="180" y2="530" stroke="#00695c" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="400" y1="410" x2="180" y2="570" stroke="#00695c" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
